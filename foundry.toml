[profile.default]
bytecode_hash = "none"
evm_version = "cancun"
ffi = true
fs_permissions = [{access = "read-write", path = "./"}]
libs = ["lib"]
out = "out"
solc_version = "0.8.30"
src = "src"
via_ir = false
optimizer = true
optimizer_runs = 200
no_match_coverage = "(script/|scripts/|helpers/|src/libraries/|lib/|test/)"

[fuzz]
runs = 256

[invariant]
runs = 256
depth = 500
fail_on_revert = true

[lint]
exclude_lints = ["screaming-snake-case-immutable", "screaming-snake-case-const"]
lint_on_build = false
